<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Insights — Spendy</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/shell.css" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/pages.css" />
</head>
<body>
  <div id="auth-loading" class="page-loading">
    <span class="spinner" style="border-top-color:var(--spendy-primary); border-color:rgba(16,185,129,0.2);"></span>
    Loading Spendy…
  </div>

  <div class="app-shell">
    <aside id="app-sidebar" class="app-sidebar"></aside>

    <div>
      <header id="app-topbar" class="app-topbar"></header>

      <main class="app-content">
        <div class="page-toolbar">
          <p class="u-muted" style="font-size:var(--fs-sm);">Generated from your transaction history using GPT-5.</p>
          <button class="btn btn--primary" id="refresh-insights-btn">Refresh insights</button>
        </div>

        <div class="insight-card-grid" id="insight-card-grid">
          <div class="glass-card empty-state-block" style="grid-column: 1 / -1;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18h6M10 22h4M12 2a6 6 0 00-4 10.5c.6.6 1 1.4 1 2.5h6c0-1.1.4-1.9 1-2.5A6 6 0 0012 2z"/></svg>
            <h3>No insights yet</h3>
            <p>Log a few transactions and Spendy's AI will surface spending patterns and advice here.</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/assets/js/pages/ai-insights.js"></script>
</body>
</html>
