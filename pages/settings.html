<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Spendy</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/shell.css" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/pages.css" />
</head>
<body>
  <div id="auth-loading" class="page-loading">
    <span class="spinner" style="border-top-color:var(--spendy-primary); border-color:rgba(16,185,129,0.2);"></span>
    Loading Spendy…
  </div>

  <div class="app-shell">
    <aside id="app-sidebar" class="app-sidebar"></aside>

    <div>
      <header id="app-topbar" class="app-topbar"></header>

      <main class="app-content" style="max-width: 640px;">
        <div class="glass-card settings-section">
          <h2>Appearance</h2>
          <div class="settings-row">
            <div>
              <div class="settings-row__label">Dark mode</div>
              <div class="settings-row__desc">Switch between light and dark theme</div>
            </div>
            <button class="toggle-switch" id="settings-theme-toggle" role="switch" aria-checked="false"></button>
          </div>
        </div>

        <div class="glass-card settings-section">
          <h2>Preferences</h2>
          <div class="settings-row">
            <div>
              <div class="settings-row__label">Currency</div>
              <div class="settings-row__desc">Used across all amounts in Spendy</div>
            </div>
            <select class="field-input" id="settings-currency" style="width:auto;">
              <option value="INR">₹ INR</option>
              <option value="USD">$ USD</option>
              <option value="EUR">€ EUR</option>
            </select>
          </div>
        </div>

        <div class="glass-card settings-section">
          <h2>Notifications</h2>
          <div class="settings-row">
            <div>
              <div class="settings-row__label">Budget warnings</div>
              <div class="settings-row__desc">Get notified when you're close to your monthly limit</div>
            </div>
            <button class="toggle-switch is-on" id="settings-budget-alerts" role="switch" aria-checked="true"></button>
          </div>
          <div class="settings-row">
            <div>
              <div class="settings-row__label">AI insight digests</div>
              <div class="settings-row__desc">Weekly summary of spending patterns</div>
            </div>
            <button class="toggle-switch is-on" id="settings-ai-digests" role="switch" aria-checked="true"></button>
          </div>
        </div>

        <div class="glass-card settings-section">
          <h2>Account</h2>
          <div class="settings-row">
            <div>
              <div class="settings-row__label">Signed in as</div>
              <div class="settings-row__desc" id="settings-account-email">—</div>
            </div>
            <button class="btn btn--ghost" id="settings-logout-btn">Log out</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/assets/js/pages/settings.js"></script>
</body>
</html>
