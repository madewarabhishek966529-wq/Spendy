<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget — Spendy</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/tokens.css" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/shell.css" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/pages.css" />
</head>
<body>
  <div id="auth-loading" class="page-loading">
    <span class="spinner" style="border-top-color:var(--spendy-primary); border-color:rgba(16,185,129,0.2);"></span>
    Loading Spendy…
  </div>

  <div class="app-shell">
    <aside id="app-sidebar" class="app-sidebar"></aside>

    <div>
      <header id="app-topbar" class="app-topbar"></header>

      <main class="app-content">
        <div class="glass-card budget-hero" id="budget-hero-card">
          <div class="budget-ring-wrap">
            <svg width="200" height="200" viewBox="0 0 200 200">
              <circle cx="100" cy="100" r="84" fill="none" stroke="var(--border-glass)" stroke-width="14"/>
              <circle id="budget-ring-progress" cx="100" cy="100" r="84" fill="none" stroke="url(#ring-grad)"
                stroke-width="14" stroke-linecap="round" stroke-dasharray="527" stroke-dashoffset="527"
                transform="rotate(-90 100 100)"/>
              <defs>
                <linearGradient id="ring-grad" x1="0" y1="0" x2="200" y2="200">
                  <stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#06B6D4"/>
                </linearGradient>
              </defs>
              <text x="100" y="94" text-anchor="middle" font-family="Poppins" font-size="26" font-weight="700" fill="var(--text-primary)" id="budget-ring-percent">0%</text>
              <text x="100" y="116" text-anchor="middle" font-family="Inter" font-size="12" fill="var(--text-muted)">used</text>
            </svg>
          </div>
          <div class="budget-meta">
            <div class="budget-meta-row"><span class="u-muted">Monthly Budget</span><strong id="budget-total">Not set</strong></div>
            <div class="budget-meta-row"><span class="u-muted">Spent so far</span><strong id="budget-spent">₹0</strong></div>
            <div class="budget-meta-row"><span class="u-muted">Remaining</span><strong id="budget-remaining">—</strong></div>
            <div class="budget-meta-row"><span class="u-muted">Daily Spending Limit</span><strong id="budget-daily-limit">—</strong></div>
            <div class="budget-meta-row"><span class="u-muted">Budget Health Score</span><strong id="budget-health-score">—</strong></div>
            <button class="btn btn--primary" id="set-budget-btn" style="align-self:flex-start;">Set monthly budget</button>
          </div>
        </div>

        <div class="glass-card panel" style="margin-top: var(--sp-5);">
          <div class="panel__header"><h2>Smart Recommendations</h2></div>
          <div id="budget-recommendations" class="panel__body">
            <p class="empty-state u-muted">Recommendations appear here once a budget is set and you have some spending history.</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/assets/js/pages/budget.js"></script>
</body>
</html>
